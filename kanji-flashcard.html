<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漢字カード — Kanji Flashcard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0d;
    --surface: #1a1917;
    --surface2: #242220;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --text2: #9a9590;
    --text3: #5c5954;
    --accent: #e8c97a;
    --accent2: #c4a355;
    --green: #6dbf8a;
    --red: #e07070;
    --green-bg: rgba(109,191,138,0.12);
    --red-bg: rgba(224,112,112,0.12);
    --radius: 12px;
    --radius-lg: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .logo-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
  }
  .logo-text {
    font-size: 13px;
    font-weight: 300;
    color: var(--text2);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header-stats {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text3);
  }
  .header-stat span {
    color: var(--text2);
    font-weight: 500;
  }

  /* ── Screens ── */
  .screen { display: none; flex: 1; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── Select Screen ── */
  #screen-select {
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
    padding: 40px 32px;
    gap: 28px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 14px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
  }

  /* range inputs */
  .range-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .range-row label {
    font-size: 13px;
    color: var(--text2);
  }
  .num-input {
    width: 72px;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .num-input:focus { border-color: var(--accent2); }

  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 400;
  }
  .btn:hover { background: var(--surface2); border-color: var(--border2); }
  .btn-accent {
    background: var(--accent);
    color: #0f0e0d;
    border-color: var(--accent);
    font-weight: 500;
  }
  .btn-accent:hover { background: var(--accent2); border-color: var(--accent2); color: #0f0e0d; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* category chips */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 400;
  }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.on {
    background: var(--accent);
    color: #0f0e0d;
    border-color: var(--accent);
    font-weight: 500;
  }

  /* mode buttons */
  .mode-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .mode-btn {
    padding: 9px 20px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--border2); color: var(--text); }
  .mode-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(232,201,122,0.08); }

  .sel-footer {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    padding-top: 8px;
  }
  .sel-count {
    font-size: 13px;
    color: var(--text2);
    margin-left: auto;
  }
  .sel-count strong { color: var(--accent); }

  /* search */
  .search-wrap {
    position: relative;
  }
  .search-input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--border2); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }
  .search-results {
    margin-top: 10px;
    max-height: 200px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .search-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .search-item:hover { background: var(--surface2); }
  .search-item.selected-item { background: rgba(232,201,122,0.08); }
  .si-num { font-size: 11px; color: var(--text3); min-width: 28px; }
  .si-kanji { font-family: 'Noto Serif JP', serif; font-size: 18px; color: var(--text); min-width: 48px; }
  .si-kana { font-size: 12px; color: var(--text2); min-width: 110px; }
  .si-meaning { font-size: 13px; color: var(--text2); flex: 1; }
  .si-check {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    color: transparent;
    transition: all 0.15s;
  }
  .selected-item .si-check { background: var(--accent); border-color: var(--accent); color: #0f0e0d; }

  /* ── Quiz Screen ── */
  #screen-quiz {
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
    padding: 32px 24px;
    gap: 0;
    align-items: stretch;
  }

  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .quiz-counter {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.06em;
  }
  .quiz-counter strong { color: var(--text2); font-weight: 500; }

  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 36px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* Flashcard */
  .card-wrap {
    perspective: 1000px;
    margin-bottom: 24px;
    flex: 1;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 48px 32px;
    min-height: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: border-color 0.2s, transform 0.15s;
    user-select: none;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .card:active { transform: translateY(0); }

  .card-badge {
    position: absolute;
    top: 18px;
    left: 20px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 500;
  }
  .card-no {
    position: absolute;
    top: 18px;
    right: 20px;
    font-size: 11px;
    color: var(--text3);
  }

  .card-main {
    font-family: 'Noto Serif JP', serif;
    font-size: 72px;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }
  .card-main.latin { font-family: 'DM Sans', sans-serif; font-size: 28px; font-weight: 300; }
  .card-sub {
    font-size: 16px;
    color: var(--text2);
    font-weight: 300;
  }

  .card-divider {
    width: 40px;
    height: 1px;
    background: var(--border2);
    margin: 20px auto;
  }

  .card-answer { display: none; text-align: center; }
  .card-answer.visible { display: block; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .answer-main {
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 6px;
  }
  .answer-kana {
    font-size: 15px;
    color: var(--text2);
    font-weight: 300;
  }
  .answer-kanji {
    font-family: 'Noto Serif JP', serif;
    font-size: 40px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .flip-hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.05em;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  /* Rating */
  .rating-row {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s;
  }
  .rating-row.visible { opacity: 1; pointer-events: all; transform: none; }
  .btn-rate {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-know {
    background: var(--green-bg);
    color: var(--green);
    border-color: rgba(109,191,138,0.25);
  }
  .btn-know:hover { background: rgba(109,191,138,0.2); }
  .btn-unknown {
    background: var(--red-bg);
    color: var(--red);
    border-color: rgba(224,112,112,0.25);
  }
  .btn-unknown:hover { background: rgba(224,112,112,0.2); }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 0;
  }
  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    text-align: center;
  }
  .stat-num {
    font-size: 24px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; }
  .stat-know .stat-num { color: var(--green); }
  .stat-unknown .stat-num { color: var(--red); }
  .stat-left .stat-num { color: var(--text2); }

  /* keyboard hint */
  .keyboard-hints {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 12px 0;
    flex-wrap: wrap;
  }
  .kh { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
  .kbd {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    color: var(--text2);
    min-width: 22px;
  }

  /* ── Result Screen ── */
  #screen-result {
    max-width: 560px;
    margin: 0 auto;
    width: 100%;
    padding: 60px 24px;
    align-items: center;
    justify-content: center;
    gap: 28px;
    text-align: center;
  }
  .result-icon {
    font-family: 'Noto Serif JP', serif;
    font-size: 56px;
    color: var(--accent);
  }
  .result-title {
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
  }
  .result-sub { font-size: 14px; color: var(--text2); font-weight: 300; }
  .result-big-stats {
    display: flex;
    gap: 16px;
    justify-content: center;
    width: 100%;
  }
  .res-stat {
    flex: 1;
    max-width: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 16px;
  }
  .res-num { font-size: 40px; font-weight: 500; line-height: 1; margin-bottom: 6px; }
  .res-label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .res-green .res-num { color: var(--green); }
  .res-red .res-num { color: var(--red); }

  .result-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* Responsive */
  @media (max-width: 500px) {
    header { padding: 14px 18px; }
    #screen-select { padding: 24px 16px; }
    #screen-quiz { padding: 24px 16px; }
    .card-main { font-size: 52px; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-kanji">漢字</span>
    <span class="logo-text">Flashcard</span>
  </div>
  <div class="header-stats">
    <div class="header-stat">Total: <span>557</span> kanji</div>
  </div>
</header>

<!-- ═══════════════ SELECT SCREEN ═══════════════ -->
<div id="screen-select" class="screen active">

  <div>
    <p class="section-title">Rentang nomor</p>
    <div class="panel">
      <div class="range-row">
        <label>Dari nomor</label>
        <input type="number" class="num-input" id="range-from" min="1" max="557" value="1">
        <label>sampai</label>
        <input type="number" class="num-input" id="range-to" min="1" max="557" value="100">
        <button class="btn btn-accent" onclick="applyRange()">Terapkan</button>
      </div>
    </div>
  </div>

  <div>
    <p class="section-title">Pilih cepat per kelompok</p>
    <div class="panel">
      <div class="chips" id="cat-chips"></div>
    </div>
  </div>

  <div>
    <p class="section-title">Cari kanji spesifik</p>
    <div class="panel">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input" placeholder="Ketik kanji, hiragana, atau arti...">
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <div>
    <p class="section-title">Mode kuis</p>
    <div class="panel">
      <div class="mode-group">
        <button class="mode-btn on" id="mode-k2a" onclick="setMode('k2a')">Kanji → Arti</button>
        <button class="mode-btn" id="mode-a2k" onclick="setMode('a2k')">Arti → Kanji</button>
        <button class="mode-btn" id="mode-mix" onclick="setMode('mix')">Campur</button>
      </div>
    </div>
  </div>

  <div class="sel-footer">
    <button class="btn btn-accent" style="padding:11px 28px;font-size:14px" onclick="startQuiz()">Mulai kuis →</button>
    <button class="btn btn-sm" onclick="selectAll()">Pilih semua</button>
    <button class="btn btn-sm" onclick="clearAll()">Hapus semua</button>
    <span class="sel-count" id="sel-count">Dipilih: <strong>100</strong> kanji</span>
  </div>

</div>

<!-- ═══════════════ QUIZ SCREEN ═══════════════ -->
<div id="screen-quiz" class="screen">

  <div class="quiz-header">
    <button class="btn btn-sm" onclick="backToSelect()">← Kembali</button>
    <span class="quiz-counter" id="quiz-counter"><strong>1</strong> / 1</span>
    <button class="btn btn-sm" onclick="shuffleAndRestart()">Acak ulang</button>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

  <div class="card-wrap">
    <div class="card" id="flashcard" onclick="flipCard()">
      <span class="card-badge" id="card-badge">Kanji → Arti</span>
      <span class="card-no" id="card-no">#1</span>
      <div class="card-main" id="card-main"></div>
      <div class="card-sub" id="card-sub"></div>
      <div class="card-answer" id="card-answer">
        <div class="card-divider"></div>
        <div id="answer-content"></div>
      </div>
      <span class="flip-hint" id="flip-hint">klik untuk lihat jawaban · spasi</span>
    </div>
  </div>

  <div class="rating-row" id="rating-row">
    <button class="btn-rate btn-unknown" onclick="rate(false)">✕ Belum tahu</button>
    <button class="btn-rate btn-know" onclick="rate(true)">✓ Tahu</button>
  </div>

  <div class="keyboard-hints">
    <span class="kh"><kbd class="kbd">Space</kbd> balik kartu</span>
    <span class="kh"><kbd class="kbd">1</kbd> belum tahu</span>
    <span class="kh"><kbd class="kbd">2</kbd> tahu</span>
  </div>

  <div class="stats-row">
    <div class="stat-card stat-know"><div class="stat-num" id="stat-know">0</div><div class="stat-label">Tahu</div></div>
    <div class="stat-card stat-unknown"><div class="stat-num" id="stat-unknown">0</div><div class="stat-label">Belum</div></div>
    <div class="stat-card stat-left"><div class="stat-num" id="stat-left">0</div><div class="stat-label">Tersisa</div></div>
  </div>

</div>

<!-- ═══════════════ RESULT SCREEN ═══════════════ -->
<div id="screen-result" class="screen">
  <div class="result-icon">完</div>
  <div>
    <h2 class="result-title">Sesi selesai!</h2>
    <p class="result-sub" id="result-sub"></p>
  </div>
  <div class="result-big-stats">
    <div class="res-stat res-green"><div class="res-num" id="res-know">0</div><div class="res-label">Tahu</div></div>
    <div class="res-stat res-red"><div class="res-num" id="res-unknown">0</div><div class="res-label">Belum tahu</div></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-accent" onclick="retryUnknown()">Ulangi yang belum tahu →</button>
    <button class="btn" onclick="retryAll()">Ulangi semua</button>
    <button class="btn" onclick="backToSelect()">Pilih kanji lain</button>
  </div>
</div>

<script>

const CATS=[
  {label:"1–50",f:1,t:50},{label:"51–100",f:51,t:100},{label:"101–150",f:101,t:150},
  {label:"151–200",f:151,t:200},{label:"201–250",f:201,t:250},{label:"251–300",f:251,t:300},
  {label:"301–350",f:301,t:350},{label:"351–400",f:351,t:400},{label:"401–450",f:401,t:450},
  {label:"451–557",f:451,t:557}
];

let selected=new Set(), mode='k2a', deck=[], idx=0, flipped=false, knowN=0, unknownN=0, unknownCards=[];

function init(){
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='chip'; b.textContent=c.label;
    b.onclick=()=>toggleCat(c,b);
    document.getElementById('cat-chips').appendChild(b);
  });
  applyRange();
  document.getElementById('search-input').addEventListener('input', doSearch);
  document.addEventListener('keydown', onKey);
}

function applyRange(){
  const f=parseInt(document.getElementById('range-from').value)||1;
  const t=parseInt(document.getElementById('range-to').value)||100;
  selected.clear();
  RAW.forEach(r=>{ if(r[0]>=f&&r[0]<=t) selected.add(r[0]); });
  updateCatChips(); updateCount();
}

function toggleCat(c,el){
  const all=RAW.filter(r=>r[0]>=c.f&&r[0]<=c.t).every(r=>selected.has(r[0]));
  RAW.forEach(r=>{ if(r[0]>=c.f&&r[0]<=c.t){ all?selected.delete(r[0]):selected.add(r[0]); }});
  updateCatChips(); updateCount();
}

function updateCatChips(){
  const chips=document.querySelectorAll('#cat-chips .chip');
  CATS.forEach((c,i)=>{
    const all=RAW.filter(r=>r[0]>=c.f&&r[0]<=c.t).every(r=>selected.has(r[0]));
    chips[i].classList.toggle('on',all);
  });
}

function selectAll(){ RAW.forEach(r=>selected.add(r[0])); updateCatChips(); updateCount(); }
function clearAll(){ selected.clear(); updateCatChips(); updateCount(); }
function updateCount(){
  document.getElementById('sel-count').innerHTML='Dipilih: <strong>'+selected.size+'</strong> kanji';
}

function setMode(m){
  mode=m;
  ['k2a','a2k','mix'].forEach(x=>document.getElementById('mode-'+x).classList.toggle('on',x===m));
}

function doSearch(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  const res=document.getElementById('search-results');
  res.innerHTML='';
  if(!q){return;}
  const hits=RAW.filter(r=>r[1].includes(q)||r[2].includes(q)||r[3].toLowerCase().includes(q)).slice(0,30);
  hits.forEach(r=>{
    const d=document.createElement('div');
    d.className='search-item'+(selected.has(r[0])?' selected-item':'');
    d.innerHTML=`<span class="si-num">${r[0]}</span><span class="si-kanji">${r[1]}</span><span class="si-kana">${r[2]}</span><span class="si-meaning">${r[3]}</span><span class="si-check">${selected.has(r[0])?'✓':''}</span>`;
    d.onclick=()=>toggleOne(r[0],d);
    res.appendChild(d);
  });
}

function toggleOne(id,el){
  if(selected.has(id)){selected.delete(id);el.classList.remove('selected-item');el.querySelector('.si-check').textContent='';}
  else{selected.add(id);el.classList.add('selected-item');el.querySelector('.si-check').textContent='✓';}
  updateCatChips(); updateCount();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function startQuiz(){
  if(!selected.size){alert('Pilih minimal 1 kanji!');return;}
  deck=shuffle(RAW.filter(r=>selected.has(r[0])));
  idx=0;knowN=0;unknownN=0;unknownCards=[];
  showScreen('quiz'); renderCard();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function shuffleAndRestart(){deck=shuffle([...deck]);idx=0;knowN=0;unknownN=0;unknownCards=[];renderCard();}

let cardMode='k2a';
function renderCard(){
  flipped=false;
  const r=deck[idx];
  cardMode=mode==='mix'?(idx%2===0?'k2a':'a2k'):mode;
  document.getElementById('card-badge').textContent=cardMode==='k2a'?'Kanji → Arti':'Arti → Kanji';
  document.getElementById('card-no').textContent='#'+r[0];
  const main=document.getElementById('card-main');
  const sub=document.getElementById('card-sub');
  if(cardMode==='k2a'){
    main.textContent=r[1]; main.className='card-main';
    sub.textContent='';
  } else {
    main.textContent=r[3]; main.className='card-main latin';
    sub.textContent=r[2];
  }
  document.getElementById('card-answer').className='card-answer';
  document.getElementById('flip-hint').style.display='block';
  document.getElementById('rating-row').classList.remove('visible');
  updateProgress();
}

function flipCard(){
  if(flipped) return;
  flipped=true;
  const r=deck[idx];
  const ans=document.getElementById('answer-content');
  if(cardMode==='k2a'){
    ans.innerHTML=`<div class="answer-main">${r[3]}</div><div class="answer-kana">${r[2]}</div>`;
  } else {
    ans.innerHTML=`<div class="answer-kanji">${r[1]}</div><div class="answer-kana">${r[2]}</div>`;
  }
  document.getElementById('card-answer').className='card-answer visible';
  document.getElementById('flip-hint').style.display='none';
  document.getElementById('rating-row').classList.add('visible');
}

function rate(know){
  if(know){knowN++;}else{unknownN++;unknownCards.push(deck[idx]);}
  document.getElementById('stat-know').textContent=knowN;
  document.getElementById('stat-unknown').textContent=unknownN;
  idx++;
  if(idx>=deck.length){ showResult(); } else { renderCard(); }
}

function updateProgress(){
  const pct=Math.round(idx/deck.length*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('quiz-counter').innerHTML='<strong>'+(idx+1)+'</strong> / '+deck.length;
  document.getElementById('stat-left').textContent=deck.length-idx;
}

function showResult(){
  document.getElementById('res-know').textContent=knowN;
  document.getElementById('res-unknown').textContent=unknownN;
  const pct=Math.round(knowN/deck.length*100);
  document.getElementById('result-sub').textContent='Kamu tahu '+knowN+' dari '+deck.length+' kanji ('+pct+'%)';
  showScreen('result');
}

function retryUnknown(){
  if(!unknownCards.length){alert('Semua sudah tahu!');return;}
  deck=shuffle([...unknownCards]);idx=0;knowN=0;unknownN=0;unknownCards=[];
  showScreen('quiz');renderCard();
}
function retryAll(){deck=shuffle([...deck]);idx=0;knowN=0;unknownN=0;unknownCards=[];showScreen('quiz');renderCard();}
function backToSelect(){showScreen('select');}

function onKey(e){
  const q=document.getElementById('screen-quiz');
  if(!q.classList.contains('active')) return;
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();flipCard();}
  else if(e.key==='1'&&flipped){rate(false);}
  else if(e.key==='2'&&flipped){rate(true);}
}

init();
</script>
